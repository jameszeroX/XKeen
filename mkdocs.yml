site_name: XKeen
site_description: POSIX-shell утилита для прозрачной маршрутизации трафика через Xray и Mihomo на роутерах Keenetic/Netcraze
site_url: https://kittylabassistant.github.io/XKeen/
repo_url: https://github.com/kittylabassistant/XKeen
repo_name: kittylabassistant/XKeen
edit_uri: edit/main/

docs_dir: site_src
site_dir: site

theme:
  name: material
  language: ru
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      lang: ru

hooks:
  - hooks/edit_url.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

nav:
  - Главная: index.md
  - FAQ: faq.md
  - Конфигурация: configuration.md
  - Изменения форка:
    - Описание изменений: forkinfo.md
    - Известные проблемы: knownissues.md
  - Команды: commands.md
  - Руководства:
    - DNS-over-VLESS: guides/dns-over-vless.md
    - Маршрутизация по DSCP: guides/dscp-routing.md
  - Для разработчиков:
    - Обзор: dev/index.md
    - Архитектура: dev/architecture.md
    - Сборка и релиз: dev/build-and-release.md
    - Пути на роутере: dev/runtime-paths.md
    - Участие в проекте: dev/contributing.md
    - XKeen 2.0 Beta: dev/beta-notes.md
